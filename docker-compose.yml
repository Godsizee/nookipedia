version: '3.8'
services:
  directus:
    image: 'directus/directus:10.10.0'
    container_name: nookipedia_directus
    restart: always
    ports:
      - '8055:8055'
    environment:
      KEY: nookipedia-secret-encryption-key-random
      SECRET: nookipedia-secret-token-key-random
      DB_CLIENT: pg
      DB_HOST: 'database'
      DB_PORT: '5432'
      DB_DATABASE: 'nookipedia'
      DB_USER: 'directus'
      DB_PASSWORD: 'directus_secure_pw_123!'
      CACHE_ENABLED: 'true'
      CACHE_STORE: redis
      CACHE_REDIS: 'redis://cache:6379'
      REDIS: 'redis://cache:6379'
      ADMIN_EMAIL: 'admin@nookipedia.de'
      ADMIN_PASSWORD: '1arschmusik!'
      PUBLIC_URL: 'https://directus.2.godsize.info'
    depends_on:
      - database
      - cache
    networks:
      - coolify
      - nookipedia_net

  database:
    image: 'postgres:16-alpine'
    container_name: nookipedia_db_new
    restart: always
    environment:
      POSTGRES_DB: 'nookipedia'
      POSTGRES_USER: 'directus'
      POSTGRES_PASSWORD: 'directus_secure_pw_123!'
    volumes:
      - nookipedia_db_data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d
    networks:
      - nookipedia_net

  cache:
    image: 'redis:7-alpine'
    container_name: nookipedia_redis
    restart: always
    expose:
      - '6379'
    networks:
      - nookipedia_net

networks:
  coolify:
    external: true
  nookipedia_net:
    name: nookipedia_net
    driver: bridge

volumes:
  nookipedia_db_data: