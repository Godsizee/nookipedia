version: '3.8'
services:
  directus:
    image: 'directus/directus:10.10.0'
    container_name: nookipedia_directus
    restart: always
    ports:
      - '8055:8055'
    environment:
      KEY: nookipedia-secret-encryption-key-random
      SECRET: nookipedia-secret-token-key-random
      DB_CLIENT: pg
      DB_HOST: 'postgres_db'
      DB_PORT: '5432'
      DB_DATABASE: 'nookipedia_db'
      DB_USER: 'n8n_user'
      DB_PASSWORD: '!!ArschMusik11'
      CACHE_ENABLED: 'true'
      CACHE_STORE: redis
      CACHE_REDIS: 'redis://cache:6379'
      ADMIN_EMAIL: 'admin@nookipedia.de'
      ADMIN_PASSWORD: '1arschmusik!'
      PUBLIC_URL: 'https://directus.2.godsize.info'
    depends_on:
      - cache
    networks:
      - coolify
      - nookipedia_net
  cache:
    image: 'redis:7-alpine'
    container_name: nookipedia_redis
    restart: always
    expose:
      - '6379'
    networks:
      - nookipedia_net

networks:
  coolify:
    external: true
  nookipedia_net:
    name: nookipedia_net
    driver: bridge